server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Sirve la aplicación Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirige las llamadas /api/ hacia el contenedor del backend
    location /api/ {
        # 'api' es el nombre del servicio en el docker-compose.
        # El puerto es 8000 porque es el puerto INTERNO del contenedor python, no el externo.
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}








